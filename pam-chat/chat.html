<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pam</title>
<style>
:root {
  --bg: #0e1117; --panel: #161b22; --user: #1f2937; --pam: #0f3a2e;
  --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --border: #30363d;
  --success: #3fb950; --danger: #f85149;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
.app { display: grid; grid-template-columns: 1fr 320px; height: 100%; }
.main { display: flex; flex-direction: column; min-width: 0; }
.header { padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 16px; margin: 0; }
.header .meta { font-size: 12px; color: var(--muted); }
.header button { background: transparent; color: var(--muted); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
.header button:hover { color: var(--text); border-color: var(--accent); }
.messages { flex: 1; overflow-y: auto; padding: 20px; }
.msg { max-width: 720px; margin: 12px auto; padding: 12px 16px; border-radius: 8px;
  white-space: pre-wrap; word-wrap: break-word; line-height: 1.5; font-size: 14.5px; }
.msg.user { background: var(--user); border-left: 3px solid var(--accent); }
.msg.pam { background: var(--pam); border-left: 3px solid var(--success); }
.msg .role { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.msg img.uploaded-img { max-width: 100%; max-height: 400px; border-radius: 6px; margin-top: 8px; display: block; cursor: pointer; }
.msg img.uploaded-img:hover { opacity: 0.9; }
.msg .file-attachment { display: inline-flex; align-items: center; gap: 6px; background: var(--panel);
  border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; margin-top: 6px; font-size: 13px; }
.msg .file-attachment .icon { font-size: 16px; }
.composer { border-top: 1px solid var(--border); padding: 12px 20px; display: flex; gap: 10px; align-items: flex-end; }
.composer textarea { flex: 1; background: var(--panel); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
  font-family: inherit; font-size: 14px; resize: none; min-height: 44px; max-height: 200px; }
.composer textarea:focus { outline: none; border-color: var(--accent); }
.composer button { border: none; border-radius: 8px; height: 44px; cursor: pointer; white-space: nowrap; }
.composer button:disabled { opacity: 0.5; cursor: not-allowed; }
#send { background: var(--accent); color: #0e1117; font-weight: 600; padding: 0 20px; }
#upload-btn { background: var(--panel); color: var(--muted); border: 1px solid var(--border); padding: 0 12px; font-size: 18px; }
#upload-btn:hover { color: var(--text); border-color: var(--accent); }
#file-input { display: none; }
.side { background: var(--panel); border-left: 1px solid var(--border); padding: 16px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
.side h2 { font-size: 12px; margin: 0; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.side a { color: var(--accent); text-decoration: none; font-size: 13px; }
.side a:hover { text-decoration: underline; }
.tool-log { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 11.5px; color: var(--muted); background: #0d1117;
  border: 1px solid var(--border); border-radius: 6px; padding: 8px;
  max-height: 280px; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word; }
.tool-log .line { padding: 2px 0; border-bottom: 1px dashed #21262d; }
.tool-log .line:last-child { border-bottom: none; }
.empty { color: var(--muted); font-size: 12px; font-style: italic; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--success);
  border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.uploads-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
.uploads-list .item { display: flex; align-items: center; gap: 6px; font-size: 12px;
  padding: 4px 6px; border-radius: 4px; cursor: pointer; }
.uploads-list .item:hover { background: var(--user); }
.uploads-list .item .thumb { width: 28px; height: 28px; border-radius: 4px; object-fit: cover;
  background: var(--border); flex-shrink: 0; }
.uploads-list .item .info { flex: 1; min-width: 0; }
.uploads-list .item .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.uploads-list .item .size { color: var(--muted); font-size: 10px; }
.uploads-list .item .send-btn { background: none; border: none; color: var(--accent); cursor: pointer;
  font-size: 14px; padding: 2px 6px; border-radius: 3px; height: auto; }
.uploads-list .item .send-btn:hover { background: rgba(88,166,255,0.15); }
.drag-overlay { display: none; position: fixed; inset: 0; background: rgba(14,17,23,0.92);
  z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  border: 3px dashed var(--success); font-size: 22px; color: var(--success); pointer-events: none; }
.drag-overlay.active { display: flex; }
.drag-overlay .icon { font-size: 48px; }
.upload-toast { position: fixed; bottom: 80px; right: 20px; background: var(--panel);
  border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px;
  display: none; align-items: center; gap: 8px; z-index: 20; }
.upload-toast.show { display: flex; }
.upload-toast .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--success);
  border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
</style>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="header">
      <h1>Pam</h1>
      <div style="display:flex;gap:10px;align-items:center;">
        <span class="meta" id="meta">ready</span>
        <a href="/dashboard" target="_blank" style="color:var(--accent);font-size:12px;text-decoration:none;">dashboard</a>
        <button id="reset">reset</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <button id="upload-btn" title="Upload file (image, PDF, document)">📎</button>
      <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.gif,.webp,.bmp,.pdf,.txt,.md,.json,.csv,.py,.js,.ts,.html,.css,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip,.rar,.7z,image/*,application/pdf,text/*">
      <textarea id="input" placeholder="Type to Pam… (Enter = send, Shift+Enter = newline)"></textarea>
      <button id="send">Send</button>
    </div>
  </div>
  <div class="side">
    <div>
      <h2>Uploaded files</h2>
      <div class="uploads-list" id="uploads-list"><span class="empty">no uploads yet</span></div>
    </div>
    <div>
      <h2>Pending drafts</h2>
      <div class="tool-log" id="drafts"><span class="empty">no drafts yet</span></div>
      <div style="margin-top:8px;font-size:11px;color:var(--muted);">Say <code style="background:#0d1117;padding:1px 4px;border-radius:3px;">go</code> to commit, <code style="background:#0d1117;padding:1px 4px;border-radius:3px;">discard</code> to throw away.</div>
    </div>
    <div>
      <h2>Recent actions</h2>
      <div class="tool-log" id="toollog"><span class="empty">no actions yet</span></div>
    </div>
    <div>
      <h2>Workspace</h2>
      <a href="/dashboard" target="_blank">→ Dashboard</a>
    </div>
  </div>
</div>
<div class="drag-overlay" id="drag-overlay">
  <div class="icon">📎</div>
  <div>Drop file here to upload</div>
</div>
<div class="upload-toast" id="upload-toast"><span class="spinner"></span><span id="upload-toast-msg">Uploading…</span></div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const resetBtn = document.getElementById('reset');
const metaEl = document.getElementById('meta');
const toolLogEl = document.getElementById('toollog');
const draftsEl = document.getElementById('drafts');
const uploadsListEl = document.getElementById('uploads-list');
const fileInput = document.getElementById('file-input');
const uploadBtn = document.getElementById('upload-btn');
const dragOverlay = document.getElementById('drag-overlay');
const uploadToast = document.getElementById('upload-toast');
const uploadToastMsg = document.getElementById('upload-toast-msg');

function addMsg(role, text, extra) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'pam');
  const r = document.createElement('div');
  r.className = 'role';
  r.textContent = role === 'user' ? 'Glenn' : 'Pam';
  const c = document.createElement('div');
  c.textContent = text;
  div.appendChild(r);
  div.appendChild(c);
  if (extra && extra.imageUrl) {
    const img = document.createElement('img');
    img.className = 'uploaded-img';
    img.src = extra.imageUrl;
    img.alt = extra.filename || 'uploaded image';
    img.onclick = () => window.open(img.src, '_blank');
    div.appendChild(img);
  }
  if (extra && extra.filePath) {
    const fa = document.createElement('div');
    fa.className = 'file-attachment';
    const icon = document.createElement('span');
    icon.className = 'icon';
    icon.textContent = extra.isImage ? '🖼️' : '📄';
    const info = document.createElement('span');
    info.textContent = extra.filename + ' (' + formatSize(extra.size) + ')';
    fa.appendChild(icon);
    fa.appendChild(info);
    div.appendChild(fa);
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function setBusy(busy) {
  sendBtn.disabled = busy;
  metaEl.innerHTML = busy ? '<span class="spinner"></span>thinking…' : 'ready';
}

function appendToolLog(lines) {
  if (!lines || !lines.length) return;
  if (toolLogEl.querySelector('.empty')) toolLogEl.innerHTML = '';
  for (const line of lines) {
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = line;
    toolLogEl.appendChild(div);
  }
  toolLogEl.scrollTop = toolLogEl.scrollHeight;
}

function showToast(msg) { uploadToastMsg.textContent = msg; uploadToast.classList.add('show'); }
function hideToast() { uploadToast.classList.remove('show'); }

// ---------- uploads ----------

async function uploadFile(file) {
  showToast('Uploading ' + file.name + '…');
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch('/upload', { method: 'POST', body: fd });
    const data = await r.json();
    hideToast();
    if (data.ok) {
      showToast('✓ ' + data.filename + ' uploaded');
      setTimeout(hideToast, 3000);
      const isImage = /\.(png|jpg|jpeg|gif|webp|bmp)$/i.test(file.name);
      addMsg('user', 'Uploaded: ' + data.filename, {
        isImage: isImage,
        filePath: data.path,
        filename: data.filename,
        size: data.size,
        imageUrl: isImage ? '/uploads/' + data.saved_as : null,
      });
      sendToPam('I just uploaded a file: ' + data.path + ' (' + data.size + ' bytes). ' +
        (isImage ? 'It is an image. Describe what you see.' : 'Read this file and tell me what it contains.'));
      refreshUploads();
    } else {
      showToast('✗ ' + (data.error || 'upload failed'));
      setTimeout(hideToast, 5000);
    }
  } catch (e) {
    hideToast();
    showToast('✗ upload error: ' + e.message);
    setTimeout(hideToast, 5000);
  }
}

async function refreshUploads() {
  try {
    const r = await fetch('/uploads');
    const items = await r.json();
    if (!items.length) { uploadsListEl.innerHTML = '<span class="empty">no uploads yet</span>'; return; }
    uploadsListEl.innerHTML = '';
    for (const it of items) {
      const isImage = /\.(png|jpg|jpeg|gif|webp|bmp)$/i.test(it.name);
      const div = document.createElement('div');
      div.className = 'item';
      if (isImage) {
        const thumb = document.createElement('img');
        thumb.className = 'thumb';
        thumb.src = '/uploads/' + it.name;
        div.appendChild(thumb);
      } else {
        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        thumb.style.cssText = 'display:flex;align-items:center;justify-content:center;font-size:14px;';
        thumb.textContent = '📄';
        div.appendChild(thumb);
      }
      const info = document.createElement('div');
      info.className = 'info';
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = it.name.split('_').slice(1).join('_') || it.name;
      const size = document.createElement('div');
      size.className = 'size';
      size.textContent = formatSize(it.size);
      info.appendChild(name);
      info.appendChild(size);
      div.appendChild(info);
      const sb = document.createElement('button');
      sb.className = 'send-btn';
      sb.textContent = '💬';
      sb.title = 'Ask Pam about this file';
      sb.onclick = () => sendToPam('Look at this file: ' + it.path + '. Read it and tell me what you see.');
      div.appendChild(sb);
      uploadsListEl.appendChild(div);
    }
  } catch {}
}

uploadBtn.onclick = () => fileInput.click();
fileInput.onchange = () => {
  if (fileInput.files && fileInput.files[0]) { uploadFile(fileInput.files[0]); fileInput.value = ''; }
};

// Global drag and drop
let dragCounter = 0;
document.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; dragOverlay.classList.add('active'); });
document.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dragOverlay.classList.remove('active'); } });
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault(); dragCounter = 0; dragOverlay.classList.remove('active');
  if (e.dataTransfer.files && e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
});

// Paste images from clipboard
inputEl.addEventListener('paste', (e) => {
  const items = e.clipboardData.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (file) uploadFile(file);
      break;
    }
  }
});

// ---------- chat ----------

async function refreshDrafts() {
  try {
    const r = await fetch('/drafts');
    const items = await r.json();
    if (!items.length) { draftsEl.innerHTML = '<span class="empty">no drafts yet</span>'; return; }
    draftsEl.innerHTML = '';
    for (const it of items) {
      const div = document.createElement('div');
      div.className = 'line';
      div.style.cursor = 'pointer';
      div.title = 'click to view draft';
      div.textContent = it.path + '  (' + it.bytes + ' b)';
      div.onclick = async () => {
        const r2 = await fetch('/drafts/' + encodeURIComponent(it.path));
        if (!r2.ok) return;
        const d = await r2.json();
        alert('drafts/' + d.path + '\n\n' + d.content);
      };
      draftsEl.appendChild(div);
    }
  } catch {}
}

function sendToPam(text) {
  if (!text.trim()) return;
  addMsg('user', text);
  setBusy(true);
  fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text }),
  })
  .then(r => r.json())
  .then(data => {
    addMsg('pam', data.reply || '(no reply)');
    appendToolLog(data.tool_log);
    if (data.model) metaEl.textContent = data.model;
    refreshDrafts();
  })
  .catch(e => { addMsg('pam', '[network error] ' + e.message); })
  .finally(() => setBusy(false));
}

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  sendToPam(text);
}

sendBtn.onclick = send;
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
resetBtn.onclick = async () => {
  if (!confirm('Clear all conversation history?')) return;
  await fetch('/reset', { method: 'POST' });
  messagesEl.innerHTML = '';
  toolLogEl.innerHTML = '<span class="empty">no actions yet</span>';
};

(async () => {
  try {
    const r = await fetch('/history');
    const msgs = await r.json();
    for (const m of msgs) addMsg(m.role === 'user' ? 'user' : 'pam', m.content);
  } catch {}
  refreshDrafts();
  refreshUploads();
  inputEl.focus();
})();
</script>
</body>
</html>
